<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: transparent; }
      .text { 
        fill: #1F2937; /* Tailwind Gray 800 */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 64px;
        letter-spacing: -2px;
      }
      .accent { fill: #3B82F6; } /* Tailwind Blue 500 */
      
      @media (prefers-color-scheme: dark) {
        .text { fill: #F3F4F6; } /* Tailwind Gray 100 */
      }
    </style>
  </defs>
  
  <rect width="800" height="120" class="bg"/>
  <text x="400" y="80" class="text" text-anchor="middle">
    cynox<tspan class="accent">.</tspan>
  </text>
</svg>
